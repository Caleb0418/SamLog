<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>쌤로그 — 플로팅 코치마크 튜토리얼 목업</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root {
  --bg: #FFFFFF;
  --bg-surface: #FFFFFF;
  --bg-elevated: #F7F7F5;
  --bg-overlay: #FAFAF7;
  --text: #191919;
  --text-secondary: #6B6860;
  --text-tertiary: #9B9B9B;
  --accent: #7F77DD;
  --accent-dim: #EBE9FB;
  --accent-hover: #6B62D1;
  --border: #E8E8E5;
  --border-strong: #CCCAB8;
  --border-accent: #D8D4F2;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
}
[data-theme="dark"] {
  --bg: #0F0F0D;
  --bg-surface: #1A1916;
  --bg-elevated: #222220;
  --bg-overlay: #2A2926;
  --text: #F0EEE8;
  --text-secondary: #A09E98;
  --text-tertiary: #6B6860;
  --accent: #9D95E8;
  --accent-dim: #2A2545;
  --accent-hover: #B0A8F0;
  --border: #2E2C28;
  --border-strong: #3D3B36;
  --border-accent: #3D3568;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg-elevated);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  letter-spacing: -0.01em;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 상단 컨트롤 바 ── */
.dev-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 2000;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 12px;
}
.dev-bar-label {
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.dev-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}
.dev-btn {
  padding: 5px 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.1s;
}
.dev-btn:hover { background: var(--bg-elevated); }
.dev-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.dev-divider { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

/* ── 가짜 앱 레이아웃 ── */
.app-mock {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
  padding-top: 38px;
  background: var(--bg);
}

/* 사이드바 */
.sidebar-mock {
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sidebar-logo {
  padding: 8px 12px 20px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.12s;
}
.nav-item:hover { background: var(--bg-elevated); color: var(--text); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}
.nav-item-icon { font-size: 16px; }

/* 콘텐츠 영역 */
.content-mock {
  padding: 28px 36px;
  overflow-y: auto;
  max-height: calc(100vh - 38px);
}
.content-head {
  margin-bottom: 20px;
}
.content-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
}
.content-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* 콘텐츠 박스 (각 탭의 fake UI) */
.fake-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
}
.fake-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fake-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  resize: vertical;
  min-height: 70px;
}
.fake-input:focus { outline: none; border-color: var(--accent); }
.fake-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.fake-chip {
  padding: 6px 10px;
  border-radius: 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  font-size: 11.5px;
  color: var(--text-secondary);
}
.fake-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
}
.fake-table th, .fake-table td {
  border: 1px solid var(--border);
  padding: 8px 10px;
  text-align: center;
}
.fake-table th { background: var(--bg-elevated); font-weight: 600; color: var(--text-secondary); }
.fake-class-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.fake-class-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  background: var(--bg);
}
.fake-class-card-time { font-size: 11px; color: var(--text-tertiary); font-weight: 600; }
.fake-class-card-subj { font-size: 14px; font-weight: 700; margin-top: 4px; }
.fake-class-card-cls { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.fake-student-list { display: flex; flex-direction: column; gap: 2px; }
.fake-student-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text);
}
.fake-student-item:hover { background: var(--bg-elevated); }
.fake-student-num {
  font-size: 10px;
  color: var(--text-tertiary);
  width: 22px;
  text-align: center;
}
.fake-color-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.fake-color-pill {
  padding: 5px 10px;
  border-radius: 12px;
  border: 1.5px solid;
  font-size: 11px;
  font-weight: 600;
}
.fake-color-pill.obs    { color: #3B82F6; border-color: #B8D4F8; background: #E8F1FE; }
.fake-color-pill.cons   { color: #1B7F4F; border-color: #A7D9BE; background: #E8F5EE; }
.fake-color-pill.life   { color: #D97706; border-color: #F8D49A; background: #FEF3E2; }
.fake-color-pill.parent { color: #7A4FB8; border-color: #D4C2EB; background: #F2EDFA; }
.fake-color-pill.unsorted { color: #C03A2B; border-color: #F5B9B3; background: #FDECEA; }
.fake-search {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
}
.fake-matrix {
  display: grid;
  grid-template-columns: 80px repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.fake-matrix-cell {
  background: var(--bg-surface);
  padding: 10px;
  font-size: 11px;
  text-align: center;
}
.fake-matrix-cell.head { background: var(--bg-elevated); font-weight: 600; color: var(--text-secondary); }
.fake-matrix-cell.done { background: #D9F0E3; color: #1B7F4F; }
.fake-progress-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.fake-progress-label { font-size: 13px; width: 80px; }
.fake-progress-bar {
  flex: 1;
  height: 8px;
  background: var(--bg-elevated);
  border-radius: 4px;
  overflow: hidden;
}
.fake-progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
}
.fake-progress-pct { font-size: 11px; color: var(--text-tertiary); width: 40px; text-align: right; }

.fake-wizard-step {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}
.fake-wizard-step.active {
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}
.fake-wizard-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--bg-elevated);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
}
.fake-wizard-step.active .fake-wizard-num {
  background: var(--accent);
  color: #fff;
}

.fake-att-controls { display: flex; gap: 4px; margin-bottom: 12px; }
.fake-att-tab {
  padding: 6px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-family: inherit;
  cursor: pointer;
}
.fake-att-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.fake-class-view-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.fake-sgt-tabs { display: flex; gap: 4px; margin-bottom: 16px; }

/* ════════════════════════════════════════════
   글로우 효과 (.tour-spotlight)
════════════════════════════════════════════ */
@keyframes tourPulse {
  0%, 100% {
    box-shadow:
      0 0 0 3px var(--accent-dim),
      0 0 0 6px transparent;
  }
  50% {
    box-shadow:
      0 0 0 4px var(--accent),
      0 0 0 10px var(--accent-dim);
  }
}
.tour-spotlight {
  animation: tourPulse 1.8s ease-in-out infinite;
  border-radius: 8px;
  position: relative;
  z-index: 5;
}

/* ════════════════════════════════════════════
   플로팅 코치마크 패널
════════════════════════════════════════════ */
.tour-panel {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 340px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow:
    0 20px 50px rgba(0,0,0,0.18),
    0 0 0 1px rgba(127, 119, 221, 0.1);
  z-index: 1000;
  overflow: hidden;
  animation: tourSlideIn 0.32s cubic-bezier(0.22,1,0.36,1);
}
@keyframes tourSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.tour-panel-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.tour-head-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.tour-tab-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.tour-tab-label .tab-icon { font-size: 16px; }
.tour-sub-counter {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-left: 2px;
}
.tour-head-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.tour-total-counter {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  padding: 3px 8px;
  background: var(--bg-elevated);
  border-radius: 10px;
  letter-spacing: 0.02em;
}
.tour-close {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-tertiary);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-family: inherit;
  line-height: 1;
}
.tour-close:hover { background: var(--bg-elevated); color: var(--text); }

.tour-progress-bar {
  height: 4px;
  background: var(--bg-elevated);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}
.tour-progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-hover));
  border-radius: 2px;
  transition: width 0.35s cubic-bezier(0.22,1,0.36,1);
}
.tour-sub-dots {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.tour-sub-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border-strong);
  transition: all 0.2s;
}
.tour-sub-dot.active {
  background: var(--accent);
  width: 16px;
  border-radius: 3px;
}

.tour-panel-body {
  padding: 16px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.tour-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.35;
}
.tour-desc {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.tour-empty-hint {
  font-size: 12px;
  color: var(--text-tertiary);
  padding: 10px 12px;
  background: var(--bg-elevated);
  border-radius: 7px;
  border-left: 3px solid var(--border-strong);
  line-height: 1.5;
  font-style: italic;
}
.tour-btn-try {
  padding: 9px 14px;
  border-radius: 8px;
  border: 1.5px dashed var(--border-accent);
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.12s;
  margin-top: 2px;
}
.tour-btn-try:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  border-style: solid;
}

.tour-panel-foot {
  padding: 10px 16px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tour-btn-prev {
  padding: 7px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.1s;
}
.tour-btn-prev:hover { background: var(--bg-elevated); color: var(--text); }
.tour-btn-skip {
  padding: 7px 10px;
  border: none;
  background: none;
  color: var(--text-tertiary);
  font-size: 11.5px;
  font-family: inherit;
  cursor: pointer;
  transition: color 0.1s;
}
.tour-btn-skip:hover { color: var(--text-secondary); }
.tour-btn-next {
  padding: 8px 16px;
  border: none;
  border-radius: 7px;
  background: var(--accent);
  color: #fff;
  font-size: 12.5px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.1s;
}
.tour-btn-next:hover { background: var(--accent-hover); }

/* 모바일 — 하단 시트 */
@media (max-width: 600px) {
  .app-mock { grid-template-columns: 64px 1fr; }
  .sidebar-mock { padding: 16px 6px; }
  .nav-item { justify-content: center; padding: 9px 6px; font-size: 0; }
  .nav-item-icon { font-size: 18px; }
  .sidebar-logo { font-size: 0; padding: 8px; }
  .content-mock { padding: 16px; }
  .tour-panel {
    right: 0; bottom: 0; left: 0;
    width: 100%;
    border-radius: 14px 14px 0 0;
  }
}
</style>
</head>
<body>

<!-- 개발 컨트롤 바 -->
<div class="dev-bar">
  <div class="dev-bar-label">📐 플로팅 코치마크 튜토리얼 목업 · <span id="dev-step-name">홈 · 퀵 메모</span></div>
  <div class="dev-controls">
    <button class="dev-btn" onclick="jumpTo(0)">처음</button>
    <button class="dev-btn" onclick="changeStep(-1)">← 이전</button>
    <button class="dev-btn" onclick="changeStep(1)">다음 →</button>
    <span id="dev-step-counter" style="font-size:11px;color:var(--text-tertiary);min-width:36px;text-align:center;">1/20</span>
    <button class="dev-btn" onclick="toggleEmpty()" id="empty-toggle">데이터 있음</button>
    <button class="dev-btn" onclick="toggleCs()" id="cs-toggle-btn">창체 OFF</button>
    <button class="dev-btn active" onclick="toggleRole()" id="role-toggle-btn">담임</button>
    <div class="dev-divider"></div>
    <button class="dev-btn active" id="btn-light" onclick="setTheme('light')">라이트</button>
    <button class="dev-btn" id="btn-dark" onclick="setTheme('dark')">다크</button>
  </div>
</div>

<!-- 가짜 앱 -->
<div class="app-mock">
  <!-- 사이드바 -->
  <div class="sidebar-mock">
    <div class="sidebar-logo">쌤로그</div>
    <button class="nav-item" data-tab="home" onclick="jumpToTab('home')"><span class="nav-item-icon">🏠</span>홈</button>
    <button class="nav-item" data-tab="attendance" onclick="jumpToTab('attendance')"><span class="nav-item-icon">✓</span>출결</button>
    <button class="nav-item" data-tab="class" onclick="jumpToTab('class')"><span class="nav-item-icon">📅</span>수업 관리</button>
    <button class="nav-item" data-tab="students" onclick="jumpToTab('students')"><span class="nav-item-icon">👥</span>학생 관리</button>
    <button class="nav-item" data-tab="saenggibu" onclick="jumpToTab('saenggibu')"><span class="nav-item-icon">📄</span>생기부</button>
    <button class="nav-item" data-tab="reply" onclick="jumpToTab('reply')"><span class="nav-item-icon">💬</span>학부모 상담</button>
  </div>

  <!-- 콘텐츠 (탭별로 갱신) -->
  <div class="content-mock" id="content-mock">
    <!-- 동적 -->
  </div>
</div>

<!-- 플로팅 코치마크 패널 -->
<div class="tour-panel" id="tour-panel">
  <div class="tour-panel-head">
    <div class="tour-head-row">
      <div class="tour-tab-label">
        <span class="tab-icon" id="tour-tab-icon">🏠</span>
        <span id="tour-tab-name">홈</span>
        <span class="tour-sub-counter">(<span id="tour-sub-cur">1</span>/<span id="tour-sub-total">3</span>)</span>
      </div>
      <div class="tour-head-right">
        <span class="tour-total-counter"><span id="tour-cur">1</span>/20</span>
        <button class="tour-close" onclick="alert('실제 앱에서는 닫힙니다')" aria-label="닫기">×</button>
      </div>
    </div>
    <div class="tour-progress-bar"><div class="tour-progress-bar-fill" id="tour-bar" style="width:5.88%"></div></div>
    <div class="tour-sub-dots" id="tour-sub-dots"></div>
  </div>
  <div class="tour-panel-body">
    <div class="tour-title" id="tour-title">퀵 메모 한 줄</div>
    <div class="tour-desc" id="tour-desc">오늘 있었던 일을 한 줄로 남겨보세요. 자동 저장돼요.</div>
    <div class="tour-empty-hint" id="tour-empty-hint" style="display:none"></div>
    <button class="tour-btn-try" id="tour-try-btn">✏️ 직접 입력해보기</button>
  </div>
  <div class="tour-panel-foot">
    <button class="tour-btn-prev" id="tour-prev" onclick="changeStep(-1)" style="display:none">← 이전</button>
    <div style="flex:1"></div>
    <button class="tour-btn-skip" onclick="alert('실제 앱에서는 닫힙니다')">닫기</button>
    <button class="tour-btn-next" id="tour-next" onclick="changeStep(1)">다음 →</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   17개 스텝 정의
════════════════════════════════════════════ */
var TOUR_STEPS = [
  { tab:'home', tabIcon:'🏠', tabName:'홈',
    title:'퀵 메모 + @멘션으로 학생·반 자동 연결',

/* ════════════════════════════════════════════
   스텝 렌더
════════════════════════════════════════════ */
function getGroupInfo(idx) {
  var tab = TOUR_STEPS[idx].tab;
  var first = idx, last = idx;
  while (first > 0 && TOUR_STEPS[first-1].tab === tab) first--;
  while (last < TOUR_STEPS.length-1 && TOUR_STEPS[last+1].tab === tab) last++;
  return { first:first, last:last, total:last-first+1, pos:idx-first+1 };
}

function clearHighlight() {
  document.querySelectorAll('.tour-spotlight').forEach(function(el) {
    el.classList.remove('tour-spotlight');
  });
}

function renderStep() {
  var step = TOUR_STEPS[currentStep];
  var grp = getGroupInfo(currentStep);

  // 0) 단계별 자동 상태 — 창체 ON/OFF 임장 단계 진입 시 토글 ON
  if (step.title && step.title.indexOf('창체 ON/OFF') !== -1) {
    if (!csToggleOn) {
      csToggleOn = true;
      var csBtn = document.getElementById('cs-toggle-btn');
      if (csBtn) { csBtn.textContent = '창체 ON'; csBtn.classList.add('active'); }
    }
  }

  // 1) 가짜 탭 전환
  renderTab(step.tab, step.subview);

  // 2) 코치마크 헤더
  document.getElementById('tour-tab-icon').textContent = step.tabIcon;
  document.getElementById('tour-tab-name').textContent = step.tabName;
  document.getElementById('tour-sub-cur').textContent = grp.pos;
  document.getElementById('tour-sub-total').textContent = grp.total;
  document.getElementById('tour-cur').textContent = currentStep + 1;
  document.getElementById('tour-bar').style.width = ((currentStep+1)/TOUR_STEPS.length*100) + '%';

  // 3) 서브 도트
  var dotsEl = document.getElementById('tour-sub-dots');
  dotsEl.innerHTML = '';
  for (var i = 0; i < grp.total; i++) {
    var dot = document.createElement('div');
    dot.className = 'tour-sub-dot' + (i === grp.pos-1 ? ' active' : '');
    dotsEl.appendChild(dot);
  }

  // 4) 본문
  document.getElementById('tour-title').textContent = step.title;
  document.getElementById('tour-desc').textContent = step.desc;

  // 5) 빈 상태 분기
  var hasEmptyHint = emptyMode && step.emptyHint;
  var tryBtn = document.getElementById('tour-try-btn');
  var emptyEl = document.getElementById('tour-empty-hint');
  if (hasEmptyHint) {
    emptyEl.textContent = step.emptyHint;
    emptyEl.style.display = '';
    tryBtn.style.display = 'none';
  } else {
    emptyEl.style.display = 'none';
    tryBtn.style.display = '';
  }

  // 6) 푸터
  document.getElementById('tour-prev').style.display = currentStep > 0 ? '' : 'none';
  document.getElementById('tour-next').textContent = currentStep === TOUR_STEPS.length-1 ? '완료' : '다음 →';

  // 7) 글로우
  clearHighlight();
  if (!hasEmptyHint) {
    setTimeout(function() {
      var el = document.querySelector(step.highlight);
      if (el) {
        el.classList.add('tour-spotlight');
        el.scrollIntoView({ behavior:'smooth', block:'center' });
      }
    }, 80);
  }

  // 8) 개발 바
  document.getElementById('dev-step-counter').textContent = (currentStep+1) + '/' + TOUR_STEPS.length;
  document.getElementById('dev-step-name').textContent = step.tabName + ' · ' + step.title;
}

function changeStep(dir) {
  var next = currentStep + dir;
  if (next < 0 || next >= TOUR_STEPS.length) return;
  currentStep = next;
  renderStep();
}

function jumpTo(idx) {
  currentStep = idx;
  renderStep();
}

function jumpToTab(tab) {
  for (var i = 0; i < TOUR_STEPS.length; i++) {
    if (TOUR_STEPS[i].tab === tab) {
      currentStep = i;
      renderStep();
      return;
    }
  }
}

function toggleEmpty() {
  emptyMode = !emptyMode;
  var btn = document.getElementById('empty-toggle');
  btn.textContent = emptyMode ? '데이터 없음 (빈 상태)' : '데이터 있음';
  btn.classList.toggle('active', emptyMode);
  renderStep();
}

function toggleCs() {
  csToggleOn = !csToggleOn;
  var btn = document.getElementById('cs-toggle-btn');
  btn.textContent = '창체 ' + (csToggleOn ? 'ON' : 'OFF');
  btn.classList.toggle('active', csToggleOn);
  renderStep();
}

function toggleRole() {
  teacherRole = teacherRole === 'homeroom' ? 'subject' : 'homeroom';
  var btn = document.getElementById('role-toggle-btn');
  btn.textContent = teacherRole === 'homeroom' ? '담임' : '교과';
  renderStep();
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btn-light').classList.toggle('active', t === 'light');
  document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
}

// 초기 렌더
renderStep();
</script>
